name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://api.example.test
      SKIP_PRERENDER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Knip (dead code detection — advisory)
        run: npm run knip -- --no-exit-code

      - name: Typecheck, parity, and unit tests
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload production dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    env:
      VITE_API_URL: https://api.example.test
      SKIP_PRERENDER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: E2E smoke tests (production build)
        run: npm run test:e2e -- --project=chromium --grep-invert "Route error boundary"
        env:
          CI: true
          E2E_USE_PREBUILT_DIST: "1"

      - name: E2E smoke tests (Firefox)
        run: npm run test:e2e:prebuilt -- --project=firefox --grep-invert "Route error boundary"
        env:
          CI: true
          E2E_USE_PREBUILT_DIST: "1"

      - name: E2E route error boundary (E2E build)
        run: npm run test:e2e -- tests/e2e/route-error.spec.ts --project=chromium
        env:
          CI: true

  lighthouse:
    runs-on: ubuntu-latest
    needs: quality
    if: vars.LIGHTHOUSE_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.test

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
