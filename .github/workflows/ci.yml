name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck, parity, and unit tests
        run: npm run check

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Edge typecheck
        run: npm run check:edge

      - name: Edge shared tests
        run: npm run test:edge

      - name: Verify edge shared parity
        run: npm run verify:edge-shared

      - name: Build
        run: npm run build

      - name: Generate sitemap (main only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: npm run generate-sitemap
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload production dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (production build)
        run: npm run test:e2e -- --project=chromium --grep-invert "Route error boundary"
        env:
          CI: true
          E2E_USE_PREBUILT_DIST: '1'
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key

      - name: E2E route error boundary (E2E build)
        run: npm run test:e2e -- tests/e2e/route-error.spec.ts --project=chromium
        env:
          CI: true
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
