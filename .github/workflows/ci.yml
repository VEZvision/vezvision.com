name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Knip (dead code detection — advisory)
        run: npm run knip -- --no-exit-code

      - name: Typecheck, parity, and unit tests
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload production dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (production build)
        run: npm run test:e2e -- --project=chromium --grep-invert "Route error boundary"
        env:
          CI: true
          E2E_USE_PREBUILT_DIST: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: E2E smoke tests (Firefox)
        run: npm run test:e2e:prebuilt -- --project=firefox --grep-invert "Route error boundary"
        env:
          CI: true
          E2E_USE_PREBUILT_DIST: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        continue-on-error: true

      - name: E2E route error boundary (E2E build)
        run: npm run test:e2e -- tests/e2e/route-error.spec.ts --project=chromium
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  deploy-edge:
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy submit-contact --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy subscribe-newsletter --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy unsubscribe-newsletter --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy check-maintenance-access --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy get-code-injection --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy increment-blog-view --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy retry-message-sends --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-hostido:
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTIDO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTIDO_PORT || 22 }} -H ${{ secrets.HOSTIDO_HOST }} >> ~/.ssh/known_hosts

      - name: Upload sourcemaps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: npx @sentry/cli sourcemaps inject dist/assets && npx @sentry/cli sourcemaps upload --org vezvision --project vezvision-website --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }} dist/assets
        continue-on-error: true

      - name: Deploy to Hostido via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTIDO_PORT || 22 }} -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            --exclude='.htaccess' \
            dist/ ${{ secrets.HOSTIDO_USER }}@${{ secrets.HOSTIDO_HOST }}:${{ secrets.HOSTIDO_PATH }}/

      - name: Upload .htaccess (protected from rsync --delete)
        run: |
          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.HOSTIDO_PORT || 22 }} -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            public/.htaccess ${{ secrets.HOSTIDO_USER }}@${{ secrets.HOSTIDO_HOST }}:${{ secrets.HOSTIDO_PATH }}/.htaccess

  lighthouse:
    runs-on: ubuntu-latest
    needs: quality
    if: vars.LIGHTHOUSE_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
