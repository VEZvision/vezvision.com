server {
  listen 80;
  server_tokens off;
  client_max_body_size 2m;

  # Resolve Compose service names dynamically. Coolify recreates containers
  # during deployments, so their IP addresses can change while the gateway
  # container remains running.
  resolver 127.0.0.11 ipv6=off valid=10s;

  location /rest/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept-Profile, Apikey, Authorization, Content-Profile, Content-Type, Prefer, Range, X-Client-Info" always;
    add_header Access-Control-Expose-Headers "Content-Encoding, Content-Location, Content-Range, Content-Type, Date, Location, Range-Unit" always;
    if ($request_method = OPTIONS) { return 204; }
    set $postgrest_upstream postgrest:3001;
    proxy_pass http://$postgrest_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /functions/v1/ {
    set $api_upstream api:3000;
    proxy_pass http://$api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    default_type text/plain;
    return 200 "ok\n";
  }
  location / { return 404; }
}
