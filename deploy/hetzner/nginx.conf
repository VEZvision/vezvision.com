resolver 127.0.0.11 ipv6=off valid=10s;

upstream vezvision_postgrest {
  zone vezvision_postgrest 64k;
  server vezvision-postgrest:3001 resolve;
}

upstream vezvision_api {
  zone vezvision_api 64k;
  server vezvision-api:3000 resolve;
}

server {
  listen 8080;
  server_tokens off;
  client_max_body_size 2m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;

  location /rest/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept-Profile, Apikey, Authorization, Content-Profile, Content-Type, Prefer, Range, X-Client-Info" always;
    add_header Access-Control-Expose-Headers "Content-Encoding, Content-Location, Content-Range, Content-Type, Date, Location, Range-Unit" always;
    if ($request_method = OPTIONS) { return 204; }
    proxy_pass http://vezvision_postgrest/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /functions/v1/ {
    proxy_pass http://vezvision_api/functions/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/v1/ {
    proxy_pass http://vezvision_api/admin/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_request_buffering on;
  }

  location = /healthz {
    default_type text/plain;
    return 200 "ok\n";
  }
  location / { return 404; }
}
