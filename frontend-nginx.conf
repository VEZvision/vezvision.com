server {
  listen 8080;
  server_tokens off;
  absolute_redirect off;
  root /usr/share/nginx/html;
  index index.html;
  add_header_inherit merge;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; object-src 'none'; connect-src 'self' https://api.vezlabs.dev https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.sentry.io https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; require-trusted-types-for 'script'; trusted-types default dompurify react-helmet" always;

  error_page 404 /pl/404/index.html;

  location = /404.html {
    internal;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Robots-Tag "noindex, follow" always;
  }

  location = /pl/404/index.html {
    internal;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Robots-Tag "noindex, follow" always;
  }

  location = /en/404/index.html {
    internal;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Robots-Tag "noindex, follow" always;
  }

  # Prerendered pages and the SPA shell are only served through canonical routes.
  # Nginx performs an internal redirect to index.html after resolving a directory.
  location ~ \.html$ {
    internal;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location = / {
    return 301 /pl/;
  }

  location ~ ^/(about|services|portfolio|blog|products|contact|newsletter|privacy-policy|terms|cookie-policy)/?$ {
    return 301 /pl/$1/;
  }

  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ~* \.(js|mjs|css|svg|png|jpg|jpeg|gif|webp|avif|mp4|webm|woff|woff2|ico|br|gz)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    default_type application/manifest+json;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    try_files $uri =404;
  }

  # Public discovery, policy and feed documents generated during the build.
  # Keep this list explicit so arbitrary unknown files still receive a true 404.
  location ~ ^/(robots\.txt|sitemap\.xml|llms\.txt|llms-full\.txt|ai\.txt|trusted-types-policy\.js|\.well-known/security\.txt|\.well-known/llm-policies\.json|(pl|en)/blog/feed\.xml)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    try_files $uri =404;
  }

  location ~ "^/(pl|en)/(blog|portfolio)/([a-z0-9-]{1,180})/?$" {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /$1/$2/$3/index.html /index.html;
  }

  location ~ ^/(pl|en)/(newsletter/confirm|unsubscribe)/?$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /$1/$2/index.html /index.html;
  }

  location ~ ^/(pl|en)(/(about|services|portfolio|blog|products|contact|newsletter|privacy-policy|terms|cookie-policy))?/?$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /$1$2/index.html /index.html;
  }

  location ~ ^/en(?:/|$) {
    error_page 404 /en/404/index.html;
    return 404;
  }

  location / {
    return 404;
  }
}
