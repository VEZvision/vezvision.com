# Coolify evaluates Compose paths from the repository root.
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      PORT: 3000
    networks: [vezvision_internal, coolify]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]

  postgrest:
    image: postgrest/postgrest:v14.1
    restart: unless-stopped
    environment:
      PGRST_DB_URI: ${DATABASE_URL}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3001
    networks: [vezvision_internal, coolify]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]

  gateway:
    build:
      context: .
      dockerfile: backend/nginx.Dockerfile
    restart: unless-stopped
    depends_on: [api, postgrest]
    expose: ["80"]
    networks: [vezvision_internal, coolify]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run, /tmp]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  vezvision_internal:
    internal: true
  coolify:
    external: true
